<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <meta name="description" content="StoryForge AI - Générateur de user stories avec Claude API et streaming en temps réel" />
    <meta name="theme-color" content="#6366f1" />
    <title>StoryForge AI</title>
    <style>
      :root { --bg: #f8fafc; }
      :root[data-theme="dark"] { --bg: #0f172a; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: var(--bg);
        min-height: 100dvh;
      }
      #root { width: 100%; min-height: 100dvh; }
    </style>
    <script>
      (function () {
        var saved = localStorage.getItem('sf-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute(
          'data-theme',
          saved === 'dark' || (!saved && prefersDark) ? 'dark' : 'light'
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
